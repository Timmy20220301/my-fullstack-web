<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北天氣儀表板</title>
    <style>
        body {
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; color: white;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 250px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { margin: 0; font-size: 24px; }
        .temp { font-size: 48px; font-weight: bold; margin: 20px 0; }
        .desc { font-size: 18px; opacity: 0.9; }
        .back-btn { display: inline-block; margin-top: 20px; color: white; text-decoration: none; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="weather-card">
        <h1>台北市</h1>
        <div class="temp" id="temp">--°C</div>
        <div class="desc" id="desc">取得天氣中...</div>
        <a href="index.html" class="back-btn">← 返回首頁</a>
    </div>

    <script>
        async function getWeather() {
            try {
                // 我將網址拆開組合，確保絕對不會被截斷
                const base = 'https://api.open-meteo.com/v1/forecast';
                const params = '?latitude=25.03&longitude=121.56&current_weather=true';
                const apiUrl = base + params;
                
                console.log("連線目標網址為:", apiUrl);

                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // 抓取溫度並顯示
                const temp = data.current_weather.temperature;
                document.getElementById('temp').innerText = Math.round(temp) + '°C';
                document.getElementById('desc').innerText = "台北即時天氣";

            } catch (error) {
                console.error("錯誤發生:", error);
                document.getElementById('desc').innerText = "連線失敗";
            }
        }
        getWeather();
    </script>
</body>
</html>
