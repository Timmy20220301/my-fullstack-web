<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北天氣儀表板</title>
    <style>
        body {
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; color: white;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 250px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        h1 { margin: 0; font-size: 24px; }
        .temp { font-size: 48px; font-weight: bold; margin: 20px 0; }
        .desc { font-size: 18px; opacity: 0.9; }
        .back-btn { display: inline-block; margin-top: 20px; color: white; text-decoration: none; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="weather-card">
        <h1>台北市</h1>
        <div class="temp" id="temp">--°C</div>
        <div class="desc" id="desc">取得天氣中...</div>
        <a href="index.html" class="back-btn">← 返回首頁</a>
    </div>

    <script>
        async function getWeather() {
            try {
                // 直接連線，不加額外的 Headers 檢查
                const url = 'https://open-meteo.com';
                const response = await fetch(url);
                
                // 只要 response 不成功就報錯
                if (!response.ok) throw new Error("伺服器沒反應");

                const data = await response.json();
                
                // 只要能執行到這，代表 JSON 拿到了
                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;

                document.getElementById('temp').innerText = Math.round(temp) + '°C';
                
                // 簡易天氣對照
                let status = "天氣晴";
                if (code > 0) status = "多雲";
                if (code > 50) status = "有雨";
                document.getElementById('desc').innerText = status;

            } catch (error) {
                console.error("錯誤細節:", error);
                // 如果還是失敗，嘗試最後一個備用 API
                document.getElementById('desc').innerText = "連線不穩，正在嘗試備用來源...";
                getBackupWeather();
            }
        }

        // 備用來源 (如果上面那個被你的網路擋住)
        async function getBackupWeather() {
            try {
                const res = await fetch('https://wttr.in');
                const data = await res.json();
                const temp = data.current_condition[0].temp_C;
                document.getElementById('temp').innerText = temp + '°C';
                document.getElementById('desc').innerText = "台北即時氣溫";
            } catch (e) {
                document.getElementById('desc').innerText = "網路環境受限";
            }
        }
        getWeather();
    </script>
</body>
</html>
