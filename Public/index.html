<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的多功能入口</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 100px); /* 3x3 九宮格 */
            grid-gap: 20px;
        }
        .grid-item {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            color: white; text-decoration: none; font-weight: bold;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .grid-item:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.1); }
        .empty { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="grid-container">
        <!-- 第一格：進去待辦清單 -->
        <a href="todo.html" class="grid-item">待辦清單</a>
        <!-- 第二格：台北時間雨天氣 -->
        <a href="weather.html" class="grid-item" id="time-box">
            <span id="live-time">00:00</span>
            <small>台北天氣</small>
        </a>
        <!-- 第三格：圈圈叉叉  -->
        <a href="ttt.html" class="grid-item">
            <div style="font-size: 24px;">OX</div>
            <div style="font-size: 10px;">圈圈叉叉</div>
        </a>
        <!-- 第四格：doxc2pdf -->
        <a href="convert.html" class="grid-item">
            <div style="font-size: 14px;">📄 轉 PDF</div>
        </a>
        <!-- 其他格暫時留空 -->
        <div class="grid-item empty">待續</div>
        <div class="grid-item empty">待續</div>
        <div class="grid-item empty">待續</div>
        <div class="grid-item empty">待續</div>
        <div class="grid-item empty">待續</div>
    </div>
    <script>
        function updateTime() {
            const timeDisplay = document.getElementById('live-time');
            if (timeDisplay) {
                const now = new Date();
                // 取得小時與分鐘，並確保是兩位數 (例如 09:05)
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                timeDisplay.innerText = `${hours}:${minutes}`;
            }
        }
        // 每 1000 毫秒 (1秒) 執行一次
        setInterval(updateTime, 1000);
        // 網頁一載入就立刻執行，不用等第一秒
        updateTime();
    </script>
</body>
</html>
