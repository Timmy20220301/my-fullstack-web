<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的進階待辦清單</title>
    <link rel="stylesheet" href="style.css"> <!-- 引入 CSS -->
</head>
<body>

    <div class="container">
        <h2>我的待辦清單</h2>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="新增一項任務...">
            <button onclick="addTask()">新增</button>
        </div>
        <ul id="todoList">
            <!-- 任務會出現在這裡 -->
        </ul>
    </div>

    <script src="script.js"></script> <!-- 引入 JS -->
</body>
</html>
