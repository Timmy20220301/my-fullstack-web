<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 圈圈叉叉</title>
    <style>
        body { background: #667eea; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 10px; background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; }
        .cell { width: 100px; height: 100px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #333; cursor: pointer; }
        .status { margin-bottom: 20px; font-size: 24px; font-weight: bold; }
        .back-btn { margin-top: 30px; color: white; text-decoration: none; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="status" id="status">你的回合 (O)</div>
    <div class="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <a href="index.html" class="back-btn">← 返回九宮格</a>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let isGameOver = false;
        const cells = document.querySelectorAll('.cell');

        async function makeMove(idx) {
            if (board[idx] !== "" || isGameOver) return;

            // 1. 玩家下棋
            board[idx] = "O";
            cells[idx].innerText = "O";
            if (checkWin("O")) return endGame("你贏了！");
            if (board.every(b => b !== "")) return endGame("平手！");

            // 2. 請求電腦下棋
            document.getElementById('status').innerText = "電腦思考中...";
            const response = await fetch('/ttt-move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: board })
            });
            const data = await response.json();

            if (data.index !== -1) {
                board[data.index] = "X";
                cells[data.index].innerText = "X";
                if (checkWin("X")) return endGame("電腦贏了！");
                document.getElementById('status').innerText = "你的回合 (O)";
            }
        }

        function checkWin(p) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(w => w.every(i => board[i] === p));
        }

        function endGame(msg) {
            document.getElementById('status').innerText = msg;
            isGameOver = true;
            setTimeout(() => location.reload(), 3000); // 3秒後重開
        }
    </script>
</body>
</html>
